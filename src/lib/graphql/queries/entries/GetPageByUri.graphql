query GetPageByUri(
  $site: [String] = ["davidhellmann_en"]
  $section: [String]! = ["pages"]
  $uri: [String]
  $limit: Int = 1
) {
  entries(
    site: $site,
    section: $section,
    uri: $uri,
    limit: $limit
  ) {
    ...page_contentBuilder
    ...page_company
    ...page_workArea
    ...page_workType
  }
}
