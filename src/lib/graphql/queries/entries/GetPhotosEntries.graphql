query GetPhotosEntries(
  $site: [String] = ["davidhellmann_en"]
  $limit: Int = 100
  $offset: Int = 0
  $orderBy: String = "postDate DESC"
) {
  entries(
    site: $site,
    section: ["photos"],
    limit: $limit,
    offset: $offset,
    orderBy: $orderBy
  ) {
    ...page_photosSingle
  }
  entryCount(
    site: $site,
    section: ["photos"]
  )
}
