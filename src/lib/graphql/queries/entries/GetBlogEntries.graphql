query GetBlogEntries(
  $site: [String] = ["davidhellmann_en"]
  $limit: Int = 100
  $offset: Int = 0
  $orderBy: String = "postDate DESC"
  $relatedToEntries: [EntryRelationCriteriaInput]
) {
  entries(
    site: $site,
    section: ["blog"],
    limit: $limit,
    offset: $offset,
    orderBy: $orderBy,
    relatedToEntries: $relatedToEntries
  ) {
    ...page_blogSingle
  }
  entryCount(
    site: $site,
    section: ["blog"],
    relatedToEntries: $relatedToEntries
  )
}
