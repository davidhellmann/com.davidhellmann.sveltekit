query GetWorkEntries(
  $site: [String] = ["davidhellmann_en"]
  $section: [String]! = ["work"]
  $limit: Int = 100
  $offset: Int = 0
  $orderBy: String = "postDate DESC"
) {
  entries(
    site: $site,
    section: $section,
    limit: $limit,
    offset: $offset,
    orderBy: $orderBy
  ) {
    ...page_workSingle
  }
  entryCount(
    site: $site,
    section: $section
  )
}
