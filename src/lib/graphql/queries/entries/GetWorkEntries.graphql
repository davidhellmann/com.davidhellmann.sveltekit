query GetWorkEntries(
  $site: [String] = ["davidhellmann_en"]
  $limit: Int = 100
  $offset: Int = 0
  $orderBy: String = "postDate DESC"
) {
  entries(
    site: $site,
    section: ["work"],
    limit: $limit,
    offset: $offset,
    orderBy: $orderBy
  ) {
    ...page_workSingle
  }
  entryCount(
    site: $site,
    section: ["work"]
  )
}
