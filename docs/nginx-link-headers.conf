# Nginx snippet for AI-agent content delivery
#
# Paste into the server { ... } block of your Forge site config:
#   Forge → Site → Edit Files → Nginx Configuration
# Reload nginx after saving (Forge does this automatically when you save).
#
# Why: our markdown files under /ai/...md are prerendered with the correct
# Content-Type, but once they become static files on disk, nginx serves
# them based on file extension. The default mapping for .md is
# `application/octet-stream`, which makes browsers offer a download instead
# of displaying the content. We force `text/markdown; charset=utf-8`.

location ~* \.md$ {
    types { } default_type "text/markdown; charset=utf-8";
    try_files $uri =404;
}

# --- Optional: RFC 8288 Link headers (scores extra points on isitagentready)
# The same info is already exposed via <link rel="alternate" type="text/markdown">
# in the HTML <head>, so this block is nice-to-have, not required.
#
# add_header Link '</sitemap.xml>; rel="sitemap"; type="application/xml"' always;
# add_header Link '</llms.txt>; rel="alternate"; type="text/plain"' always;
