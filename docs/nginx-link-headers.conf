# Nginx snippet — agent-discovery Link headers (RFC 8288)
#
# Paste into the server { ... } block of your Forge site config:
#   Forge → Site → Edit Files → Nginx Configuration
# Reload nginx after saving (Forge does this automatically when you save).
#
# Purpose: signals LLM/agent crawlers where to find machine-readable
# resources (sitemap, llms.txt, markdown variants of pages).
# Improves the "Link headers (RFC 8288)" check on isitagentready.com.

# --- Site-wide headers ---------------------------------------------------

# Always advertise sitemap and llms.txt
add_header Link '</sitemap.xml>; rel="sitemap"; type="application/xml"' always;
add_header Link '</llms.txt>; rel="alternate"; type="text/plain"' always;

# --- Markdown alternates per blog post -----------------------------------

# Each /blog/<slug> page also exposes a markdown variant at /blog/<slug>/llms.md.
# This block adds an alternate Link header pointing to it.
location ~ ^/blog/([^/]+)/?$ {
    add_header Link '</sitemap.xml>; rel="sitemap"; type="application/xml"' always;
    add_header Link '</llms.txt>; rel="alternate"; type="text/plain"' always;
    add_header Link '</blog/$1/llms.md>; rel="alternate"; type="text/markdown"' always;
    try_files $uri $uri/ $uri/index.html =404;
}

# --- Markdown endpoints: correct Content-Type ----------------------------

# Ensure .md files are served as text/markdown (default would be application/octet-stream).
location ~* \.md$ {
    types { } default_type "text/markdown; charset=utf-8";
    add_header Link '</sitemap.xml>; rel="sitemap"; type="application/xml"' always;
    add_header Link '</llms.txt>; rel="alternate"; type="text/plain"' always;
    try_files $uri $uri/ =404;
}

# --- Notes ---------------------------------------------------------------
#
# - `add_header` does NOT inherit when a child location defines its own
#   add_header — that's why the headers are repeated in each location block.
# - The `always` flag makes nginx send the headers even on error responses.
# - If you already have a `location /` or similar catch-all, the regex
#   `location ~ ^/blog/...` blocks above must come BEFORE it (nginx
#   evaluates regex locations in the order they appear in the config).
